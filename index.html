<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rambles Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0c; --panel:#101015; --edge:#1e1e24; --edge-soft:#16161b;
    --text:#c9c9d1; --text-bright:#f0f0f3; --muted:#73737e; --dim:#5a5a64;
    --acc:#e6463a; --serif:"Spectral",Georgia,serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:var(--mono); -webkit-font-smoothing:antialiased; }
  a { color:inherit; text-decoration:none; }
  #root { min-height:100vh; }

  /* header */
  .rg-header { display:flex; align-items:center; justify-content:space-between;
    padding:20px 26px; border-bottom:1px solid var(--edge-soft); position:relative;
    background:
      radial-gradient(120% 180% at 88% -40%, rgba(230,70,55,0.14), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 6px); }
  .rg-brand { font-size:15px; letter-spacing:0.5px; color:var(--text-bright); }
  .rg-brand .acc { color:var(--acc); }
  .rg-tag { font-size:11px; letter-spacing:1.5px; color:var(--muted); text-transform:lowercase; }
  .rg-back-link { font-size:11px; letter-spacing:1px; color:var(--muted); }
  .rg-back-link:hover { color:var(--acc); }

  /* home grid */
  .rg-home, .rg-detail { max-width:1100px; margin:0 auto; }
  .rg-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; padding:26px; }
  .rg-card { background:var(--panel); border:1px solid var(--edge); border-radius:8px;
    overflow:hidden; transition:border-color .15s, transform .15s; }
  .rg-card:hover { border-color:rgba(230,70,55,0.55); transform:translateY(-2px); }
  .rg-card-cover { aspect-ratio:16/10; overflow:hidden; background:#070708; }
  .rg-card-cover img { width:100%; height:100%; object-fit:cover; display:block; }
  .rg-card-body { padding:12px 14px 14px; }
  .rg-card-title { font-family:var(--serif); font-size:17px; color:var(--text-bright); margin-bottom:5px; }
  .rg-card-genre { font-size:11px; line-height:1.5; color:var(--muted);
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .rg-card-play { margin-top:10px; font-size:10px; letter-spacing:1.5px; color:var(--acc); }

  /* detail */
  .rg-detail-body { padding:28px 26px 48px; }
  .rg-detail-title { font-family:var(--serif); font-size:32px; color:var(--text-bright); margin:0; }
  .rg-detail-genre { font-size:12px; line-height:1.6; color:var(--muted); margin:8px 0 0; max-width:680px; }
  .rg-detail-cols { display:grid; grid-template-columns:1.6fr 1fr; gap:24px; margin-top:24px; align-items:start; }
  .rg-preview { position:relative; display:block; aspect-ratio:16/10; border-radius:8px;
    overflow:hidden; border:1px solid var(--edge); background:#070708; }
  .rg-preview img { width:100%; height:100%; object-fit:cover; display:block; }
  .rg-preview-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  .rg-preview-play::before { content:""; position:absolute; inset:0; background:rgba(10,10,12,0.25); transition:background .15s; }
  .rg-preview:hover .rg-preview-play::before { background:rgba(10,10,12,0.05); }
  .rg-pill { position:relative; font-size:13px; font-weight:700; letter-spacing:2px; color:#0a0a0c;
    background:rgba(230,70,55,0.94); padding:12px 26px; border-radius:5px; }

  .rg-detail-side { display:flex; flex-direction:column; gap:16px; }
  .rg-panel { background:var(--panel); border:1px solid var(--edge); border-radius:8px; padding:15px 16px; }
  .rg-label { font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
  .rg-noaudio p { font-size:12px; color:var(--muted); margin:0; line-height:1.6; }

  /* audio */
  .rg-wave { display:flex; align-items:flex-end; gap:3px; height:38px; margin-bottom:12px; cursor:pointer; }
  .rg-wave i { flex:1; background:var(--acc); border-radius:1px; transition:opacity .1s; min-height:2px; }
  .rg-audio-row { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text); }
  .rg-pp { background:transparent; border:1px solid var(--edge); color:var(--acc); border-radius:4px;
    width:30px; height:26px; cursor:pointer; font-family:var(--mono); font-size:11px; }
  .rg-audio-note { color:var(--dim); }

  /* transcript */
  .rg-transcript { margin-top:26px; }
  .rg-transcript-text { font-size:13px; line-height:1.9; color:#a7a7b0; max-width:780px; margin:0; white-space:pre-wrap; }

  /* play view */
  .rg-play { position:fixed; inset:0; background:#000; z-index:1000; }
  .rg-play-frame { width:100%; height:100%; border:0; display:block; }
  .rg-play-back { position:fixed; top:16px; left:16px; z-index:1001; width:40px; height:40px;
    border-radius:50%; background:rgba(10,10,12,0.78); border:1px solid rgba(230,70,55,0.55);
    color:var(--acc); font-size:20px; display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); }
  .rg-play-back:hover { background:rgba(230,70,55,0.92); color:#0a0a0c; }

  @media (max-width:640px) {
    .rg-header { padding:16px 16px; }
    .rg-grid { grid-template-columns:repeat(2,1fr); gap:10px; padding:16px; }
    .rg-detail-body { padding:20px 16px 40px; }
    .rg-detail-title { font-size:24px; }
    .rg-detail-cols { grid-template-columns:1fr; gap:16px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="data/games.js"></script>
<script src="shared/arcade.js"></script>
</body>
</html>
